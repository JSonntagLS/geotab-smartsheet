name: Manual Vehicle Info Autofill

on:
  workflow_dispatch: # Allows you to run it manually via a single click button

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install mygeotab smartsheet-python-sdk pandas

      - name: Run Vehicle Lookup
        run: python vehicle_lookup.py
        env:
          GEOTAB_USER: ${{ secrets.GEOTAB_USER }}
          GEOTAB_PASSWORD: ${{ secrets.GEOTAB_PASSWORD }}
          GEOTAB_DB: ${{ secrets.GEOTAB_DB }}
          SMARTSHEET_TOKEN: ${{ secrets.SMARTSHEET_TOKEN }}
          SMARTSHEET_ID: ${{ secrets.SMARTSHEET_ID }}
