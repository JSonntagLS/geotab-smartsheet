name: Saturday Asset Health Sync

on:
  schedule:
    - cron: '0 13 * * 6' # 13:00 UTC is 8:00 AM Central on Saturday
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  sync-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install mygeotab smartsheet-python-sdk pandas

      - name: Run Health Sync Robot
        run: python health_sync.py
        env:
          GEOTAB_USER: ${{ secrets.GEOTAB_USER }}
          GEOTAB_PASSWORD: ${{ secrets.GEOTAB_PASSWORD }}
          GEOTAB_DB: ${{ secrets.GEOTAB_DB }}
          SMARTSHEET_TOKEN: ${{ secrets.SMARTSHEET_TOKEN }}
          SMARTSHEET_ID: ${{ secrets.SMARTSHEET_ID }}
